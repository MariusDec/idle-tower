<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>The Tower</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <div id="app">
      <header id="hud-root" class="hud-root"></header>

      <main class="game-layout">
        <section class="canvas-wrap">
          <canvas id="game-canvas" width="1280" height="720" aria-label="Game world"></canvas>
          <div id="overlay-root" class="overlay-root"></div>
        </section>

        <aside id="panel-root" class="panel-root">
          <button id="panel-toggle" type="button" aria-label="Collapse panel"></button>
          <div id="panel-resizer" aria-hidden="true"></div>
          <nav class="panel-tabs" id="panel-tabs"></nav>
          <div class="panel-content" id="panel-content"></div>
        </aside>
      </main>

      <div id="ability-bar-root" class="ability-bar-host"></div>
      <nav id="bottom-nav-root"></nav>
      <div id="mobile-sheet-root"></div>

      <div id="toast-root" class="toast-root" aria-live="polite" aria-atomic="true"></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
